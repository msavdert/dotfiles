# Minimal & Clean Starship Theme

format = """
$username$hostname$directory$git_branch$git_status$line_break$character"""

[username]
show_always = false
style_user = "bold green"
format = "[$user]($style)@"

[hostname]
ssh_only = true
format = "[$hostname]($style) "

[directory]
truncation_length = 3
truncation_symbol = "…/"
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold red"
format = "([\\[$all_status$ahead_behind\\]]($style) )"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
