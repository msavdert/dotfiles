# ~/.tmux.conf
# Managed in: dotfiles/tmux/.tmux.conf

# =============================================================================
# General
# =============================================================================

# Use 256 colors
set -g default-terminal "screen-256color"

# Start window index at 1
set -g base-index 1

# Start pane index at 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Mouse support
set -g mouse on

# =============================================================================
# Key Bindings
# =============================================================================

# Unbind default prefix (Ctrl-b)
unbind C-b

# Set new prefix (Ctrl-a)
set -g prefix C-a
bind C-a send-prefix

# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Navigate panes with vim-style keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# =============================================================================
# Status Bar
# =============================================================================

# Status bar at top
set -g status-position top

# Colors
set -g status-bg colour237
set -g status-fg colour255

# Left side: session name
set -g status-left-length 40
set -g status-left "#[fg=colour154,bold] #S  #[fg=colour250]│ "

# Right side: date/time
set -g status-right "#[fg=colour250] %H:%M  %d-%b-%y "

# Current window
setw -g window-status-current-format "#[fg=colour154,bold] #I:#W "
setw -g window-status-format "#[fg=colour250] #I:#W "

# =============================================================================
# Messages
# =============================================================================

# Commands
set -g message-command-style fg=colour231,bg=colour31

# =============================================================================
# Performance
# =============================================================================

# Reduce escape sequence delay
set -sg escape-time 0

# Focus events
set -g focus-events on

# =============================================================================
# Default shell
# =============================================================================

set -g default-shell /bin/bash
