[tasks.sync]
description = "Sync dotfiles, update tools, and prune unused versions"
run = """
  git -C ~/.dotfiles fetch origin && \
  git -C ~/.dotfiles reset --hard origin/main && \
  chmod +x ~/.dotfiles/scripts/setup-symlinks.sh && \
  ~/.dotfiles/scripts/setup-symlinks.sh && \
  mise install && \
  mise prune --yes
"""

[tasks."ssh"]
description = "Pull sensitive configurations and SSH keys from 1Password"
run = """
  if command -v op >/dev/null; then
    echo "Pulling ~/.ssh/config.local from 1Password..."
    op read "op://dotfiles/texts/ssh_config.local" > ~/.ssh/config.local
    chmod 600 ~/.ssh/config.local

    echo "🔐 Adding OCI SSH key directly to agent..."
    op read "op://dotfiles/oci_key/private key?ssh-format=openssh" | ssh-add -
    
    echo "Secrets synchronization complete!"
  else
    echo "Error: 1Password CLI (op) not found."
    exit 1
  fi
"""

[settings]
task.source_freshness_hash_contents = true
npm.package_manager = "bun"
