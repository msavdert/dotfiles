[tools]
neovim = "latest"
zellij = "latest"
uv = "latest"
zoxide = "latest"
fzf = "latest"
starship = "latest"
usage = "latest"
eza = "latest"
bat = "latest"
lazygit = "latest"
bun = "latest"
"1password-cli" = "latest"

[tasks.sync]
description = "Sync dotfiles and update tools"
run = "git -C ~/.dotfiles pull && ~/.dotfiles/scripts/setup-symlinks.sh && mise install"

[settings]
task.source_freshness_hash_contents = true
