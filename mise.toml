[tools]
neovim = "latest"
zellij = "latest"
uv = "latest"
zoxide = "latest"
fzf = "latest"
starship = "latest"
usage = "latest"
eza = "latest"
bat = "latest"
lazygit = "latest"
bun = "latest"
node = "latest"
python = "latest"
"1password-cli" = "latest"
ripgrep = "latest"
fd = "latest"
delta = "latest"
btop = "latest"
jq = "latest"
duf = "latest"
dust = "latest"
gping = "latest"
gh = "latest"
yazi = "latest"
yq = "latest"
claude-code = "latest"

[env]
# --- GitHub Integration ---
GH_TOKEN = "{{ exec(command='op read op://dotfiles/GitHub/admintoken --raw') }}"
GITHUB_TOKEN = "{{ exec(command='op read op://dotfiles/GitHub/admintoken --raw') }}"

# --- Claude Code (OpenRouter) ---
OPENROUTER_API_KEY = "{{ exec(command=\"op read 'op://dotfiles/OpenRouter/general token' --raw\") }}"
ANTHROPIC_BASE_URL = "https://openrouter.ai/api"
ANTHROPIC_AUTH_TOKEN = "{{ exec(command=\"op read 'op://dotfiles/OpenRouter/general token' --raw\") }}"
ANTHROPIC_API_KEY = ""
ANTHROPIC_MODEL = "moonshotai/kimi-k2.6"

[tasks.sync]
description = "Sync dotfiles, update tools, and prune unused versions"
run = """
  git -C ~/.dotfiles fetch origin && \
  git -C ~/.dotfiles reset --hard origin/main && \
  chmod +x ~/.dotfiles/scripts/setup-symlinks.sh && \
  ~/.dotfiles/scripts/setup-symlinks.sh && \
  mise install && \
  mise prune --yes
"""

[tasks."secrets:pull"]
description = "Pull sensitive configurations and SSH keys from 1Password"
run = """
  if command -v op >/dev/null; then
    echo "Pulling ~/.ssh/config.local from 1Password..."
    op read "op://dotfiles/texts/ssh_config.local" > ~/.ssh/config.local
    chmod 600 ~/.ssh/config.local

    echo "Pulling SSH private key from 1Password..."
    op read "op://dotfiles/oci_key/private key" > ~/.ssh/oci_key
    chmod 600 ~/.ssh/oci_key
    
    echo "Secrets synchronization complete!"
  else
    echo "Error: 1Password CLI (op) not found."
    exit 1
  fi
"""

[settings]
task.source_freshness_hash_contents = true
