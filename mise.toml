[tasks.sync]
description = "Sync dotfiles, update tools, and prune unused versions"
run = """
  git -C ~/.dotfiles fetch origin && \
  git -C ~/.dotfiles reset --hard origin/main && \
  chmod +x ~/.dotfiles/scripts/setup-symlinks.sh && \
  ~/.dotfiles/scripts/setup-symlinks.sh && \
  mise install && \
  mise prune --yes
"""

[tasks."ssh"]
description = "Pull all SSH keys from 1Password and sync public keys"
run = """
  if command -v op >/dev/null; then
    # 1. SSH Config'i çek
    echo "Pulling ~/.ssh/config.local..."
    op read "op://dotfiles/texts/ssh_config.local" > ~/.ssh/config.local
    chmod 600 ~/.ssh/config.local

    # 2. Key listesini tanımla (SADECE BURASI DEĞİŞTİ: Array yerine tırnak içinde liste)
    KEYS="oci hetzner github"

    for KEY in $KEYS; do
      echo "🔐 Handling $KEY..."

      # 1Password'den private key'i oku
      PRIV=$(op read "op://dotfiles/$KEY/private key?ssh-format=openssh" 2>/dev/null)

      if [ -n "$PRIV" ]; then
        # Agent'a ekle
        echo "$PRIV" | ssh-add -
        
        # Public key üret ve diske yaz
        echo "$PRIV" | ssh-keygen -y -f /dev/stdin > ~/.ssh/$KEY.pub
        chmod 600 ~/.ssh/$KEY.pub
        echo "✅ $KEY synchronized."
      else
        echo "⚠️  Warning: $KEY not found in 1Password (op://dotfiles/$KEY/...)"
      fi
    done
    echo "🚀 All keys handled successfully!"
  else
    echo "❌ Error: 1Password CLI (op) not found."
    exit 1
  fi
"""


[settings]
task.source_freshness_hash_contents = true
npm.package_manager = "bun"
