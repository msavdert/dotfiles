[tools]
neovim = "latest"
zellij = "latest"
uv = "latest"
zoxide = "latest"
fzf = "latest"
starship = "latest"
usage = "latest"
eza = "latest"
bat = "latest"
lazygit = "latest"
bun = "latest"
"1password-cli" = "latest"
ripgrep = "latest"
fd = "latest"
delta = "latest"
btop = "latest"
jq = "latest"
duf = "latest"
dust = "latest"
gping = "latest"

[tasks.sync]
description = "Sync dotfiles, update tools, and prune unused versions"
run = """
  git -C ~/.dotfiles fetch origin && \
  git -C ~/.dotfiles reset --hard origin/main && \
  chmod +x ~/.dotfiles/scripts/setup-symlinks.sh && \
  ~/.dotfiles/scripts/setup-symlinks.sh && \
  mise install && \
  mise prune --yes
"""

[settings]
task.source_freshness_hash_contents = true
