[tasks.sync]
description = "Sync dotfiles, update tools, and prune unused versions"
run = """
  git -C ~/.dotfiles fetch origin && \
  git -C ~/.dotfiles reset --hard origin/main && \
  chmod +x ~/.dotfiles/scripts/setup-symlinks.sh && \
  ~/.dotfiles/scripts/setup-symlinks.sh && \
  mise install && \
  mise prune --yes
"""

[tasks."kubectl:homelab"]
description = "Pull kubeconfig from 1Password"
run = """
  mkdir -p ~/.kube
  op read "op://dotfiles/texts/homelab-kubeconfig" > ~/.kube/config
"""

[settings]
task.source_freshness_hash_contents = true
npm.package_manager = "bun"
