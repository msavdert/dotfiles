name: Test Dotfiles

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- macOS ---
          - name: macOS 15 (Latest)
            os: macos-15
          - name: macOS 14 (Stable)
            os: macos-14
          
          # --- Ubuntu ---
          - name: Ubuntu 24.04 (LTS)
            os: ubuntu-24.04
          - name: Ubuntu 22.04 (LTS)
            os: ubuntu-22.04
          
          # --- Rocky Linux (via Docker) ---
          - name: Rocky Linux 9
            os: ubuntu-latest
            container: rockylinux:9
          - name: Rocky Linux 8
            os: ubuntu-latest
            container: rockylinux:8
          
          # --- Debian (via Docker) ---
          - name: Debian 12 (Bookworm)
            os: ubuntu-latest
            container: debian:12-slim
          - name: Debian 11 (Bullseye)
            os: ubuntu-latest
            container: debian:11-slim

    container: ${{ matrix.container }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install CI Dependencies (Linux Check)
        if: runner.os == 'Linux'
        run: |
          echo "::group::Installing dependencies for ${{ matrix.name }}"
          # Check for dnf first (Rocky/RHEL), then apt-get (Ubuntu/Debian)
          if command -v dnf >/dev/null; then
            dnf install -y --allowerasing curl git tar procps-ng
          elif command -v apt-get >/dev/null; then
            apt-get update && apt-get install -y curl git tar procps
          fi
          echo "::endgroup::"

      - name: Run Bootstrap (Initial)
        run: |
          echo "::group::Bootstrapping (Initial Run)"
          ./bootstrap.sh
          echo "::endgroup::"

      - name: Run Bootstrap (Idempotency)
        run: |
          echo "::group::Bootstrapping (Second Run)"
          ./bootstrap.sh
          echo "::endgroup::"

      - name: Verify Tools
        run: |
          echo "::group::Verifying installed tools"
          export PATH="$HOME/.local/bin:$PATH"
          
          # Check each binary and print its version
          tools=("gh" "op" "uv" "zellij" "nvim" "jq")
          for tool in "${tools[@]}"; do
            echo -n "Verifying $tool: "
            $tool --version | head -n 1
          done
          echo "::endgroup::"

      - name: Verify Links
        run: |
          echo "::group::Verifying critical symlinks"
          [ -L "$HOME/.bashrc" ] || (echo "bashrc missing" && exit 1)
          [ -L "$HOME/.gitconfig" ] || (echo "gitconfig missing" && exit 1)
          echo "All links verified."
          echo "::endgroup::"
