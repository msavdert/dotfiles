name: Test Dotfiles

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - '.gitignore'
      - 'LICENSE'
      - 'Dockerfile'
      - 'docker-compose.yml'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - '.gitignore'
      - 'LICENSE'
      - 'Dockerfile'
      - 'docker-compose.yml'
  workflow_dispatch:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- macOS ---
          - name: macOS 15
            os: macos-15
          - name: macOS 14
            os: macos-14
          
          # --- Ubuntu ---
          - name: Ubuntu 24.04 (LTS)
            os: ubuntu-24.04
          - name: Ubuntu 22.04 (LTS)
            os: ubuntu-22.04
          
          # --- Oracle Linux (via Docker) ---
          - name: Oracle Linux 10
            os: ubuntu-latest
            container: oraclelinux:10
          - name: Oracle Linux 9
            os: ubuntu-latest
            container: oraclelinux:9
          
          # --- Debian (via Docker) ---
          - name: Debian 12 (Bookworm)
            os: ubuntu-latest
            container: debian:12-slim
          - name: Debian 11 (Bullseye)
            os: ubuntu-latest
            container: debian:11-slim

    container: ${{ matrix.container }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install CI Dependencies (Linux Check)
        if: runner.os == 'Linux'
        run: |
          echo "::group::Installing dependencies for ${{ matrix.name }}"
          # Check for dnf first (Oracle/RHEL), then apt-get (Ubuntu/Debian)
          if command -v dnf >/dev/null; then
            dnf install -y --allowerasing curl git tar procps-ng
          elif command -v apt-get >/dev/null; then
            apt-get update && apt-get install -y curl git tar procps
          fi
          echo "::endgroup::"

      - name: Run Bootstrap (Initial)
        run: |
          echo "::group::Bootstrapping (Initial Run)"
          ./bootstrap.sh
          echo "::endgroup::"

      - name: Run Bootstrap (Idempotency)
        run: |
          echo "::group::Bootstrapping (Second Run)"
          ./bootstrap.sh
          echo "::endgroup::"

      - name: Verify Tools
        run: |
          echo "::group::Verifying installed tools"
          export PATH="$HOME/.local/bin:$PATH"
          
          # List of tools to verify
          for tool in gh op uv zellij nvim jq; do
            echo -n "Verifying $tool: "
            if command -v "$tool" >/dev/null; then
              "$tool" --version | head -n 1
            else
              if [ "$tool" == "nvim" ]; then
                echo "SKIPPED (intentional)"
              else
                echo "FAILED (command not found)"
                exit 1
              fi
            fi
          done
          echo "::endgroup::"

      - name: Verify Links
        run: |
          echo "::group::Verifying critical symlinks"
          [ -L "$HOME/.bashrc" ] || (echo "bashrc missing" && exit 1)
          [ -L "$HOME/.gitconfig" ] || (echo "gitconfig missing" && exit 1)
          echo "All links verified."
          echo "::endgroup::"
